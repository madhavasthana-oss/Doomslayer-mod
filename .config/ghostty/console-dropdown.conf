# Ghostty dropdown terminal — used by pypr scratchpads.console
class = com.yvon.console-dropdown

# Ghostty config — colors and blur/opacity transferred from Kitty
# Kitty sources:
#   ~/.config/kitty/theme.conf      (Bad Blood colors)
#   ~/.config/kitty/hyde.conf       (background_opacity 0.60)
#   ~/.config/kitty/kitty.conf      (dynamic_background_opacity)
# Hyprland blur is compositor-level; kitty uses window opacity 0.80 in windowrules.conf
#
# Loaded via: ghostty --config-file=~/.config/ghostty/console-dropdown.conf
# Default config.ghostty is still loaded first; this file overrides dropdown-specific values.

# CaskaydiaCove is not installed; use a Nerd Font present on the system
font-family = MesloLGS Nerd Font Mono
font-size = 7
window-padding-x = 5
window-padding-y = 5

# mark-img.png was lost in the restructure; use sigil logo instead
background-image = ~/Doomslayer-mod/PIctures/logos/sigil-logo.png
background-image-opacity = 0.1
background-image-position = center
background-image-fit = contain

# opacity is set to 0.70 instead
background-opacity = 0.70
background-blur = true
background-opacity-cells = false

# custom shaders
custom-shader = shaders/cursor_sweep.glsl

