#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hypr.land/Configuring/Variables/#input
input {
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true

    # 🔗 See https://wiki.hypr.land/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}



# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}

# ---------------------------------------------------------
# DOOMSHELL — BLUR CONFIG
# ---------------------------------------------------------

decoration {

	shadow {
		enabled = false
	}
	
    blur {
        enabled = true
        size = 5
        passes = 1
        noise = 0.02
        contrast = 1
        brightness = 0.9
        new_optimizations = true    # Hyprland perf optimization
        xray = false                # false = blur sees through to wallpaper
                                    # true = ignores windows, only wallpaper
                                    # keep false for the full frosted effect
    }

    rounding = 0                    # sharp geometry — no rounding anywhere
}
 
exec-once = quickshell -p /home/yvon/Doomslayer-mod/config/doomshell/shell.qml
# app2unit.sh was a HyDE helper (removed); start pypr directly if present
exec-once = /home/yvon/.config/pypr/launch-daemon.sh
